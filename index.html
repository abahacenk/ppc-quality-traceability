<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPC Quality & Traceability</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; padding: 16px; }
.container { max-width: 520px; margin: auto; }
h1 { text-align: center; color: #38bdf8; font-size: 24px; }
.card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
input, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
input { background: #334155; color: white; border: 1px solid #475569; }
button { background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; background: #000; }
#result { margin-top: 15px; padding: 16px; border-radius: 14px; text-align: center; display: none; }
.green { background: #065f46; border: 2px solid #10b981; display: block !important; }
.red { background: #7f1d1d; border: 2px solid #ef4444; display: block !important; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 12px 8px; border-bottom: 1px solid #334155; text-align: left; }
th { color: #94a3b8; text-transform: uppercase; font-size: 11px; }
</style>
</head>

<body>

<div class="container">
<h1>PPC Quality & Traceability</h1>

<div class="card">
<input id="manual" placeholder="Input kode manual / LOT">
<button onclick="processCode()">Submit</button>

<hr style="border-top:1px solid #334155; margin:20px 0;">

<button onclick="startCamera()">Buka Kamera Scan</button>
<div id="reader"></div>

<input type="file" accept="image/*" onchange="scanFile(event)">
</div>

<div id="result"></div>

<h3>Riwayat Pemindaian</h3>
<table>
<thead>
<tr>
<th>Waktu</th>
<th>Kode</th>
<th>Status</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

const yearStart = 2022;
const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
const monthLetters = "ABCDEFGHJKLM";

function letterToNumber(char){
const map={A:0,B:1,C:2,D:3,E:4,F:5,G:6,H:7,I:8,J:9};
return map[char?.toUpperCase()] ?? 0;
}

function monthDiff(date){
const now=new Date();
return (now.getFullYear()-date.getFullYear())*12+
       (now.getMonth()-date.getMonth());
}

function diff(date){
let now=new Date();
let days=Math.floor((now-date)/86400000);
let months=Math.floor(days/30);
let rem=days%30;
return months+" bulan "+rem+" hari";
}

function decodeShort(code){
const match=code.toUpperCase().match(/[A-Z]{2}[HIM]/);
if(!match) return null;

let clean=match[0];
let y=letters.indexOf(clean[0]);
let m=monthLetters.indexOf(clean[1]);
let areaCode=clean[2];

const areaMap={H:"PM8",I:"PM9",M:"PM12"};
if(y<0||m<0) return null;

return {
date:new Date(yearStart+y,m,1),
year:yearStart+y,
month:m+1,
area:areaMap[areaCode]||"Unknown",
raw:clean
};
}

function decodeLot(lot){
if(lot.length<7) return null;

const yearCode=lot.substring(3,5);
const monthCode=lot.substring(5,7);

const year=2000+(parseInt(yearCode[0])*10)+letterToNumber(yearCode[1]);
const month=(parseInt(monthCode[0])*10)+letterToNumber(monthCode[1]);

return {year,month};
}

window.processCode=function(textFromScanner){
const input=textFromScanner||document.getElementById("manual").value.trim();
if(!input) return;

let result=document.getElementById("result");
let expired=false;
let month,year,area="";

if(input.length>8){ // LOT
let lot=decodeLot(input);
if(!lot){ alert("Format LOT tidak valid"); return; }

year=lot.year;
month=lot.month;
area="LOT PPC";

let date=new Date(year,month-1,1);
expired=monthDiff(date)>2;

result.className=expired?"red":"green";
result.innerHTML=`
<h2>${expired?"EXPIRED / HOLD":"OK - DAPAT DIKIRIM"}</h2>
<p>
<strong>Kode:</strong> ${input}<br>
<strong>Area:</strong> ${area}<br>
<strong>Produksi:</strong> ${month}/${year}<br>
<strong>Umur:</strong> ${diff(date)}
</p>`;
result.style.display="block";

saveHistory(input,expired?"EXPIRED":"OK");
}
else{ // kode pendek
let data=decodeShort(input);
if(!data){ alert("Format tidak valid"); return; }

expired=monthDiff(data.date)>2;

result.className=expired?"red":"green";
result.innerHTML=`
<h2>${expired?"EXPIRED / HOLD":"OK - DAPAT DIKIRIM"}</h2>
<p>
<strong>Kode:</strong> ${data.raw}<br>
<strong>Area:</strong> ${data.area}<br>
<strong>Produksi:</strong> ${data.month}/${data.year}<br>
<strong>Umur:</strong> ${diff(data.date)}
</p>`;
result.style.display="block";

saveHistory(data.raw,expired?"EXPIRED":"OK");
}

document.getElementById("manual").value="";
}

function saveHistory(code,status){
let h=JSON.parse(localStorage.getItem("hist")||"[]");
h.unshift({time:new Date().toLocaleString('id-ID'),code,status});
if(h.length>50) h.pop();
localStorage.setItem("hist",JSON.stringify(h));
render();
}

function render(){
let h=JSON.parse(localStorage.getItem("hist")||"[]");
document.getElementById("history").innerHTML=
h.map(r=>`
<tr>
<td>${r.time}</td>
<td><strong>${r.code}</strong></td>
<td style="color:${r.status==='OK'?'#10b981':'#ef4444'}">${r.status}</td>
</tr>`).join("");
}

let scanner;

window.startCamera=async function(){
if(scanner) await scanner.clear();
scanner=new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{ fps:15, qrbox:{width:280,height:140}},
(text)=>{
processCode(text);
scanner.stop();
}
);
}

window.scanFile=function(e){
const file=e.target.files[0];
if(!file) return;
const html5QrCode=new Html5Qrcode("reader");
html5QrCode.scanFile(file,true)
.then(text=>processCode(text))
.catch(()=>alert("Kode tidak terbaca"));
}

render();

});
</script>

</body>
</html>
