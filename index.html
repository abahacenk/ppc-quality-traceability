<script>
const yearStart = 2022;
const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
const monthLetters = "ABCDEFGHJKLM";

function letterToNumber(char){
    const map={A:0,B:1,C:2,D:3,E:4,F:5,G:6,H:7,I:8,J:9};
    return map[char.toUpperCase()] ?? 0;
}

function decode(code) {
    if (!code) return null;

    const match = code.toUpperCase().match(/[A-Z]{2}[HIM]/);
    if (!match) return null;

    let cleanCode = match[0];
    let y = letters.indexOf(cleanCode[0]);
    let m = monthLetters.indexOf(cleanCode[1]);
    let areaCode = cleanCode[2];

    const areaMap = { H:"PM8", I:"PM9", M:"PM12" };

    if (y < 0 || m < 0) return null;

    return {
        date: new Date(yearStart + y, m, 1),
        year: yearStart + y,
        month: m + 1,
        area: areaMap[areaCode] || "Unknown",
        raw: cleanCode
    };
}

// ===== DECODE LOT =====
function decodeLot(lot){
    if(lot.length < 7) return null;

    const yearCode = lot.substring(3,5);
    const monthCode = lot.substring(5,7);

    const year = 2000 + (parseInt(yearCode[0]) * 10) + letterToNumber(yearCode[1]);
    const month = (parseInt(monthCode[0]) * 10) + letterToNumber(monthCode[1]);

    return {year, month};
}

function monthDiff(date){
    const now=new Date();
    return (now.getFullYear()-date.getFullYear())*12+
           (now.getMonth()-date.getMonth());
}

function diff(date) {
    let now = new Date();
    let days = Math.floor((now - date) / 86400000);
    let months = Math.floor(days / 30);
    let remDays = days % 30;
    return months + " bulan " + remDays + " hari";
}

function processCode(input) {
    const resultDiv = document.getElementById('result');

    if(!input) return;

    // cek apakah LOT panjang
    if(input.length > 8){
        const lotData = decodeLot(input);

        if(!lotData){
            alert("Format LOT tidak valid");
            return;
        }

        const date = new Date(lotData.year, lotData.month-1,1);
        const expired = monthDiff(date) > 2;

        showResult(
            expired,
            input,
            "LOT PPC",
            lotData.month,
            lotData.year,
            diff(date)
        );

        saveHistory(input, expired ? "EXPIRED" : "OK");
        return;
    }

    // decode kode produksi biasa
    const data = decode(input);

    if (!data) {
        alert("Format tidak valid.");
        return;
    }

    const expired = monthDiff(data.date) > 2;

    showResult(
        expired,
        data.raw,
        data.area,
        data.month,
        data.year,
        diff(data.date)
    );

    saveHistory(data.raw, expired ? "EXPIRED" : "OK");
}

function showResult(expired, code, area, month, year, age){
    const resultDiv=document.getElementById('result');

    resultDiv.className = expired ? "red" : "green";
    resultDiv.innerHTML = `
        <h2>${expired ? "EXPIRED / HOLD" : "OK - DAPAT DIKIRIM"}</h2>
        <p>
        <strong>Kode:</strong> ${code}<br>
        <strong>Area:</strong> ${area}<br>
        <strong>Produksi:</strong> ${month}/${year}<br>
        <strong>Umur:</strong> ${age}
        </p>
    `;
}

function saveHistory(code, status) {
    let h = JSON.parse(localStorage.getItem("hist") || "[]");
    h.unshift({ time: new Date().toLocaleString('id-ID'), code, status });
    if (h.length > 50) h.pop();
    localStorage.setItem("hist", JSON.stringify(h));
    render();
}

function render() {
    let h = JSON.parse(localStorage.getItem("hist") || "[]");
    document.getElementById("history").innerHTML =
        h.map(r => `
        <tr>
            <td>${r.time}</td>
            <td><strong>${r.code}</strong></td>
            <td style="color:${r.status.includes('OK')?'#10b981':'#ef4444'}">${r.status}</td>
        </tr>`).join("");
}

let scanner;

async function startCamera() {
    if (scanner) await scanner.clear();
    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 280, height: 140 } },
        (text) => {
            processCode(text);
            scanner.stop();
        }
    );
}

function scanFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.scanFile(file, true)
        .then(text => processCode(text))
        .catch(() => alert("Kode tidak terbaca"));
}

render();
</script>
